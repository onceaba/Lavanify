<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavanify </title>
    <!-- Font Awesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Başlangıç Notu -->
    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <span class="lavender-heart">🪻</span>
            <h2>Hogedin!</h2>
            <p>
              Selam Gurkim, bu siteyi coverlarımı dinlemen ve coverları orijinal şarkılardan daha
              çok beğenmen için yaptım. Made with lob <3
            </p>
            <button onclick="closeModal()" class="start-btn">LET'S DO TS!!!1!!</button>
        </div>
    </div>

    <div class="container">
        <!-- Sol Liste -->
        <div class="song-list-container">
            <h2>Lavanik Şarkıları</h2>
            <div class="song-list" id="songList"></div>
        </div>

        <!-- Orta Ekran -->
        <div class="main-display" id="mainDisplay">
            <div class="vinyl-container">
                <div class="vinyl">
                    <div class="vinyl-red-center"></div>
                </div>
                <img id="main-cover" src="" alt="Kapak">
            </div>

            <div class="soundwave" id="waveContainer">
                <!-- JS ile barlar buraya gelecek -->
            </div>
        </div>
    </div>

    <!-- Alt Player Bar -->
    <div class="player-bar">
        <div class="player-left">
            <img id="cover" src="">
            <div class="song-info">
                <h3 id="title">Şarkı Seçin</h3>
                <p>Lavanik Cover</p>
            </div>
        </div>

        <div class="player-center">
            <div class="controls">
                <button onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
                <button onclick="togglePlay()" id="playBtn" class="play-main"><i class="fas fa-play"></i></button>
                <button onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">00:00</span>
                <input type="range" id="progress" value="0" min="0" max="100">
                <span id="duration">00:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fas fa-volume-up" style="color: var(--lavender-bright);"></i>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>
    <script src="script.js"></script>
</body>
</html>
